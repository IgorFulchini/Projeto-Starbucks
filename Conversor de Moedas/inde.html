<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    
    <title>Convert Money</title>
</head>
<body>
    <img src="./img/logo.gif" alt="logo-convert-money" class="logo">

<main>
    <label>
        Converter <b>de</b>
        <select>
            <option>R$ Real Brasileiro</option>

         </select>
    </label>

<label>
        Converter <b>de</b>
        <select class="currency-select">
            <option value="dolar">US$ Dólar Americano</option>
            <option value="euro">€ Euro</option>

         </select>
    </label>

    <label>
        Valor
        <input class="input-currency" placeholder="R$ 10.000,00">
    </label>

    <button class="convert-button">Converter</button>

    <section>
        <div class="currency-box">
            <img src="./img/real.png" alt="real">
            <p class="currency">Real</p>
            <p class="currency-value-to-convert">R$ 0,00</p>
        </div>

        <img class="arrow" src="./img/seta.png" alt="seta">


        <div class="currency-box">
            <img class="currency-img"src="./img/dolar.png" alt="dolar">
            <p class="currency" id="currency-name">Dólar Americano</p>
            <p class="currency-value">US$ 0,00</p>
        </div>

    </section>

</main>




<script src="./script.js"></script>
</body>
</html>
