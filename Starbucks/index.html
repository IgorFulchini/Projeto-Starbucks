<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <title>Starbucks</title>
</head>

<body>

  <nav class="navbar" role="navigation" aria-label="Menu principal">
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#about">Menu</a></li>
      <li><a href="#services">Specials</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="circulo" id="circulo"></div>

  <main class="container" id="home">

    <img src="imgs/logo.png" class="logo" alt="Logo Starbucks">

    <div class="caixa-conteudo">

      <div class="caixa-textos">
        <h2>More than Coffee</h2>
        <h3>It's an <span class="texto-starbuck" id="texto-destaque">Experience</span></h3>
        <p>Experience handcrafted beverages made with premium ingredients, designed to bring freshness, comfort and unforgettable flavor to your day.</p>
        <button class="btn-explorar">Explore Menu</button>
      </div>

      <div class="caixa-imagem">
        <img src="imgs/image1.png" class="copo" id="copo" alt="Bebida Starbucks">
      </div>

    </div>

    <div class="caixa-menu" role="group" aria-label="Selecionar bebida">
      <img src="imgs/image1.png" class="botao-menu" alt="Opção 1 - Verde"
           onclick="trocarBebida(this, '#017143', 'imgs/image1.png')">
      <img src="imgs/image2.png" class="botao-menu" alt="Opção 2 - Rosa"
           onclick="trocarBebida(this, '#eb7495', 'imgs/image2.png')">
      <img src="imgs/image3.png" class="botao-menu" alt="Opção 3 - Roxo"
           onclick="trocarBebida(this, '#d752b1', 'imgs/image3.png')">
    </div>

  </main>

  <script src="scripts.js"></script>
</body>
</html>
